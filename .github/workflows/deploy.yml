name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Por ref: PRs não disputam a fila de deploy; pushes na main seguem serializados.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Testes de regressão (cálculo AC4 e .ics)
        run: node tests/run-tests.mjs

      - name: Smoke test de interface (Chrome headless)
        run: node tests/smoke.mjs

      - name: Validação mobile (touch targets, barra fixa, overflow)
        run: node tests/mobile-check.mjs

  deploy:
    needs: test
    # PRs só testam — deploy acontece apenas em push na main / dispatch manual.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
